<!DOCTYPE html>
<html>
<head>
  <title>Skill Gap Analyzer</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>
<table border="2" >
    
    <h1 >Skill Gap Analyzer</h1>

    <tr>
        <th>
          <h2>Add User</h2>
        </th>
    </tr>
    <tr>
        <td>
           <input id="name" placeholder="Name">
           <input id="email" placeholder="Email">
           <button>Add</button>
        </td>
    </tr>

    <tr>
        <th>
           <h2>Add Skill</h2>
        </th>
    </tr>

    <tr>
        <td>
          <input id="skill" placeholder="Skill Name">
          <button>Add</button>
        </td>
    </tr>

    <tr>
        <th>
          <h2>Check Skill Gap</h2>
        </th>
    </tr>

    <tr>
        <td>
          <input id="userId" placeholder="User ID">
          <input id="jobId" placeholder="Job ID">
          <button>Check</button>
        </td>
    </tr>
<ul></ul>
</table>
</body>
</html>
